<!--
ビルマテル役員定例ボード v2
- データはwindow.storageに保存(共有モード)
- UIアップデート版: エディトリアル経営ダッシュボード
-->

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============================================
     Design Tokens
     ============================================ */
  :root {
    --ink-900: #1A1F2E;        /* 深インクブルー (見出し) */
    --ink-700: #2F3849;
    --ink-500: #56627A;        /* 本文セカンダリ */
    --ink-400: #7B8499;
    --ink-300: #A8AFBE;
    --ink-200: #D6DAE3;
    --ink-100: #E8EBF1;
    --paper: #F7F5F0;          /* 温かみのある背景 (オフホワイト) */
    --paper-2: #FBF9F4;
    --paper-3: #FFFFFF;
    --rule: #E0DDD3;           /* 罫線 */
    --rule-soft: #ECEAE2;

    --accent-ink: #1F3A5F;     /* 深ネイビー (アクセント) */
    --accent-ink-dim: #2C4D7C;
    --accent-gold: #B08838;    /* ゴールド (重要数値) */
    --accent-gold-soft: #F5EBD0;
    --accent-clay: #A84B2A;    /* 警告 (粘土土色) */
    --accent-clay-soft: #FBE6DD;
    --accent-clay-deep: #6B2B14;
    --accent-moss: #5C7A3F;    /* グリーン (達成) */
    --accent-moss-soft: #E5EFD5;
    --accent-moss-deep: #2F4A1A;
    --accent-fog: #4A6280;     /* インフォ */
    --accent-fog-soft: #DEE6F2;

    --pillar-1: #6B4DA8;       /* 紫 - 外構 */
    --pillar-1-bg: #EDE6FA;
    --pillar-2: #1F6B5A;       /* 深緑 - 地方 */
    --pillar-2-bg: #D9EDE5;
    --pillar-3: #8B3A1A;       /* テラコッタ - 工事 */
    --pillar-3-bg: #F7E0D2;
    --pillar-4: #7A5A1F;       /* オーカー - 効率化 */
    --pillar-4-bg: #F4E8CC;
    --pillar-5: #1F4A7A;       /* インディゴ - HubSpot */
    --pillar-5-bg: #DCE7F4;

    --radius-sm: 4px;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;

    --shadow-sm: 0 1px 2px rgba(26, 31, 46, 0.04);
    --shadow: 0 2px 8px rgba(26, 31, 46, 0.06), 0 1px 2px rgba(26, 31, 46, 0.04);
    --shadow-lg: 0 8px 24px rgba(26, 31, 46, 0.08), 0 2px 6px rgba(26, 31, 46, 0.04);

    --font-serif: 'Noto Serif JP', 'Georgia', serif;
    --font-sans: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--ink-900);
    background: var(--paper);
    font-feature-settings: "palt";
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }

  /* ============================================
     App Shell
     ============================================ */
  .app {
    display: grid;
    grid-template-columns: 232px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
  /* スマホ基本設定 */
  @media (max-width: 600px) {
    html { font-size: 15px; }
    body { -webkit-text-size-adjust: 100%; }
  }

  /* ============================================
     Sidebar
     ============================================ */
  .sidebar {
    background: var(--paper-2);
    border-right: 1px solid var(--rule);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .brand {
    padding: 0 8px 20px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 16px;
  }
  .brand-mark {
    font-family: var(--font-serif);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--ink-500);
    margin-bottom: 4px;
  }
  .brand-name {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-400);
    margin-top: 6px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .nav-group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--ink-400);
    text-transform: uppercase;
    padding: 12px 10px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--ink-700);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
    position: relative;
  }
  .nav-item:hover { background: var(--paper-3); color: var(--ink-900); }
  .nav-item.active {
    background: var(--ink-900);
    color: var(--paper);
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,0.18); color: var(--paper); }

  .nav-item .nav-label { flex: 1; }
  .nav-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    background: var(--accent-clay-soft);
    color: var(--accent-clay-deep);
    font-weight: 600;
    font-family: var(--font-mono);
    min-width: 18px;
    text-align: center;
  }
  .nav-badge.muted { background: var(--ink-100); color: var(--ink-500); }
  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--rule-soft);
    font-size: 11px;
    color: var(--ink-400);
  }
  .sidebar-footer .date-line {
    font-family: var(--font-mono);
    color: var(--ink-500);
    margin-top: 2px;
    padding-left: 8px;
  }
  .sidebar-footer .footer-date-block {
    padding-left: 8px;
    margin-bottom: 14px;
  }
  /* サイドバー内入力者切替 */
  .sidebar-user-switcher {
    border-top: 2px solid var(--rule);
    padding-top: 14px;
  }
  .sidebar-user-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--accent-ink);
    text-transform: uppercase;
    padding: 0 10px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sidebar-user-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-ink);
    flex-shrink: 0;
  }
  .sidebar-user-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 10px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-700);
    transition: all 0.15s;
    text-align: left;
    margin-bottom: 2px;
  }
  .sidebar-user-btn:hover { background: var(--paper-3); border-color: var(--rule-soft); }
  .sidebar-user-btn.active {
    background: var(--ink-900);
    color: var(--paper);
    border-color: transparent;
  }
  .sidebar-user-btn.active .avatar { border-color: rgba(255,255,255,0.3); }
  .sidebar-user-btn .avatar { width: 28px; height: 28px; font-size: 11px; flex-shrink: 0; }
  .sidebar-user-name { flex: 1; }
  /* トップバー右側のユーザー表示（モバイル用） */
  .topbar-user-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px 6px 7px;
    border-radius: 999px;
    border: 1px solid var(--rule);
    background: var(--paper-3);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-700);
    transition: all 0.15s;
  }
  .topbar-user-chip:hover { border-color: var(--ink-300); background: var(--paper-2); }
  .topbar-user-chip-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent-ink);
    text-transform: uppercase;
    margin-right: 2px;
  }

  /* ============================================
     Main Area
     ============================================ */
  .main {
    overflow-x: hidden;
    min-width: 0;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
    background: rgba(247, 245, 240, 0.92);
  }
  .topbar-title {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: 0.01em;
  }
  .topbar-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  @media (max-width: 600px) {
    .topbar-actions { display: none; }
  }
  /* ============================================
     ハンバーガーメニュー
     ============================================ */
  .hamburger-btn {
    display: none;
    align-items: center; justify-content: center;
    width: 40px; height: 40px;
    border: none; background: transparent;
    cursor: pointer; border-radius: var(--radius);
    color: var(--ink-700);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .hamburger-btn:hover { background: var(--paper-2); }
  @media (max-width: 880px) {
    .hamburger-btn { display: flex; }
    .topbar { padding: 10px 14px; }
    .topbar-title { font-size: 16px; }
  }

  /* ドロワー本体 */
  .drawer-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 200;
    background: rgba(26, 31, 46, 0.5);
    backdrop-filter: blur(3px);
    animation: fadeIn 0.18s ease;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    background: var(--paper-2);
    z-index: 201;
    display: flex; flex-direction: column;
    box-shadow: 4px 0 24px rgba(26,31,46,0.18);
    animation: slideInLeft 0.22s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  @keyframes slideInLeft {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--rule-soft);
    flex-shrink: 0;
  }
  .drawer-brand-mark {
    font-family: var(--font-serif);
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.18em; color: var(--ink-500);
    margin-bottom: 2px;
  }
  .drawer-brand-name {
    font-family: var(--font-serif);
    font-size: 17px; font-weight: 600;
    color: var(--ink-900); line-height: 1.3;
  }
  .drawer-close-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: transparent;
    cursor: pointer; border-radius: var(--radius);
    color: var(--ink-400);
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .drawer-close-btn:hover { background: var(--paper-3); color: var(--ink-900); }
  .drawer-nav { padding: 12px 10px; flex: 1; }
  .drawer-nav-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; color: var(--ink-400);
    text-transform: uppercase;
    padding: 10px 10px 6px;
  }
  .drawer-nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-lg);
    font-size: 14px; font-weight: 500;
    color: var(--ink-700);
    cursor: pointer; border: none;
    background: transparent; width: 100%;
    text-align: left; font-family: inherit;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    margin-bottom: 2px;
  }
  .drawer-nav-item:active { background: var(--paper-3); }
  .drawer-nav-item.active {
    background: var(--ink-900);
    color: var(--paper);
    font-weight: 600;
  }
  .drawer-nav-item.active .drawer-nav-badge { background: rgba(255,255,255,0.18); color: var(--paper); }
  .drawer-nav-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius);
    background: var(--paper-3);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .drawer-nav-item.active .drawer-nav-icon {
    background: rgba(255,255,255,0.12);
  }
  .drawer-nav-text { flex: 1; }
  .drawer-nav-badge {
    font-size: 11px; padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-clay-soft);
    color: var(--accent-clay-deep);
    font-weight: 700;
    font-family: var(--font-mono);
  }
  .drawer-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--rule-soft);
    font-size: 11px; color: var(--ink-400);
    flex-shrink: 0;
  }
  .drawer-footer .date-line {
    font-family: var(--font-mono); color: var(--ink-500); margin-top: 2px;
  }

  /* mobile-navは完全に廃止 */
  .mobile-nav { display: none !important; }

  .page-content {
    padding: 32px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 880px) {
    .page-content { padding: 16px 14px; }
  }
  @media (max-width: 600px) {
    .page-content { padding: 14px 12px; }
  }

  /* ============================================
     Hero Card (Home)
     ============================================ */
  .hero {
    background: linear-gradient(135deg, var(--ink-900) 0%, #2A3548 100%);
    color: var(--paper);
    border-radius: var(--radius-xl);
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 60%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(176, 136, 56, 0.15), transparent 60%);
    pointer-events: none;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: center;
    position: relative;
  }
  @media (max-width: 600px) {
    .hero { padding: 20px 16px; }
    .hero-grid { grid-template-columns: 1fr; gap: 12px; }
    .hero-title { font-size: 20px; }
    .hero-countdown-num { font-size: 48px; }
    .hero-countdown { text-align: left; }
    .metric-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .tile { padding: 14px; }
    .tile-value { font-size: 28px; }
  }
  .hero-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hero-title {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .hero-meta {
    font-size: 13px;
    color: rgba(247, 245, 240, 0.7);
    font-family: var(--font-mono);
    font-weight: 500;
  }
  .hero-countdown {
    text-align: right;
  }
  @media (max-width: 600px) {
    .hero-countdown { text-align: left; }
  }
  .hero-countdown-num {
    font-family: var(--font-serif);
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    color: var(--paper);
    letter-spacing: -0.02em;
  }
  .hero-countdown-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(247, 245, 240, 0.6);
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }

  /* ============================================
     Metric Tiles
     ============================================ */
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .tile {
    background: var(--paper-3);
    border-radius: var(--radius-lg);
    padding: 20px;
    border: 1px solid var(--rule-soft);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .tile:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  .tile-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--ink-500);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tile-value {
    font-family: var(--font-serif);
    font-size: 38px;
    font-weight: 600;
    line-height: 1;
    color: var(--ink-900);
    letter-spacing: -0.02em;
  }
  .tile-value .unit {
    font-size: 16px;
    color: var(--ink-400);
    font-weight: 500;
    margin-left: 4px;
  }
  .tile-sub {
    font-size: 12px;
    color: var(--ink-500);
    margin-top: 8px;
    font-weight: 500;
  }
  .tile-bar {
    margin-top: 12px;
    height: 4px;
    background: var(--ink-100);
    border-radius: 2px;
    overflow: hidden;
  }
  .tile-bar-fill {
    height: 100%;
    background: var(--accent-ink);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .tile.alert {
    background: linear-gradient(135deg, var(--accent-clay-soft) 0%, #F9D8C9 100%);
    border-color: #E8B8A0;
  }
  .tile.alert .tile-value, .tile.alert .tile-label, .tile.alert .tile-sub { color: var(--accent-clay-deep); }
  .tile.alert .tile-bar { background: rgba(168, 75, 42, 0.15); }
  .tile.alert .tile-bar-fill { background: var(--accent-clay); }
  .tile.success { background: linear-gradient(135deg, var(--accent-moss-soft) 0%, #D6E5BD 100%); border-color: #BAD095; }
  .tile.success .tile-value, .tile.success .tile-label, .tile.success .tile-sub { color: var(--accent-moss-deep); }
  .tile.gold {
    background: linear-gradient(135deg, var(--accent-gold-soft) 0%, #EDE0BC 100%);
    border-color: #D9C896;
  }
  .tile.gold .tile-value, .tile.gold .tile-label, .tile.gold .tile-sub { color: #5A4019; }
  .tile.gold .tile-bar-fill { background: var(--accent-gold); }

  /* ============================================
     Section Headers
     ============================================ */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin: 24px 0 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
    flex-wrap: wrap;
  }
  @media (max-width: 600px) {
    .section-head { margin: 20px 0 12px; }
  }
  .section-head-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .section-num {
    font-family: var(--font-serif);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-gold);
    letter-spacing: 0.1em;
  }
  .section-title {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: 0.01em;
  }
  .section-desc {
    font-size: 12px;
    color: var(--ink-500);
    font-weight: 500;
  }

  /* ============================================
     Cards & Lists
     ============================================ */
  .card {
    background: var(--paper-3);
    border-radius: var(--radius-lg);
    border: 1px solid var(--rule-soft);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-padded { padding: 20px; }
  .card-soft {
    background: var(--paper-2);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    border: 1px solid var(--rule-soft);
  }

  /* ============================================
     Member Status Card
     ============================================ */
  .member-status-card {
    background: var(--paper-3);
    border-radius: var(--radius-lg);
    border: 1px solid var(--rule-soft);
    box-shadow: var(--shadow-sm);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .member-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .member-row:last-child { border-bottom: none; }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 16px;
    flex-shrink: 0;
    border: 2px solid transparent;
  }
  .avatar-sm { width: 28px; height: 28px; font-size: 12px; }
  .avatar-xs { width: 22px; height: 22px; font-size: 10px; }
  .avatar-1  { background: #E8E0F5; color: #4A3580; border-color: #C9B8E8; } /* 紫 */
  .avatar-2  { background: #DCEDE3; color: #1F5A3A; border-color: #B5D6C0; } /* 緑 */
  .avatar-3  { background: #F5E6D3; color: #7A4A1A; border-color: #DDC499; } /* オレンジ */
  .avatar-4  { background: #D8EAF5; color: #1A4A6B; border-color: #A8CCE0; } /* 青 */
  .avatar-5  { background: #EEEAE5; color: #5A5048; border-color: #CEC8BE; } /* グレー */
  .avatar-6  { background: #FDEAEA; color: #8B1A1A; border-color: #F0B8B8; } /* 赤 */
  .avatar-7  { background: #FFF7D6; color: #7A5C00; border-color: #E8D48A; } /* 黄 */
  .avatar-8  { background: #E0F2F0; color: #1A5A54; border-color: #A8D9D4; } /* ティール */
  .avatar-9  { background: #FCE8F3; color: #8B1A5A; border-color: #F0B8D8; } /* ピンク */
  .avatar-10 { background: #E8EDF5; color: #1A2A5A; border-color: #B8C4E0; } /* ネイビー */
  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-size: 14px; font-weight: 600; color: var(--ink-900);
  }
  .member-role {
    font-size: 11px; color: var(--ink-400); margin-top: 1px;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .member-status-pills { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ============================================
     Status Pills / Badges
     ============================================ */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.02em;
    line-height: 1.5;
    border: 1px solid transparent;
  }
  .pill-success { background: var(--accent-moss-soft); color: var(--accent-moss-deep); border-color: #C5D9A4; }
  .pill-warn { background: var(--accent-gold-soft); color: #5A4019; border-color: #D9C896; }
  .pill-todo { background: var(--ink-100); color: var(--ink-500); border-color: var(--ink-200); }
  .pill-danger { background: var(--accent-clay-soft); color: var(--accent-clay-deep); border-color: #E8B8A0; }
  .pill-info { background: var(--accent-fog-soft); color: #1F3A5F; border-color: #B8C7DE; }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .pill-dot-success { background: var(--accent-moss); }
  .pill-dot-danger { background: var(--accent-clay); }
  .pill-dot-warn { background: var(--accent-gold); }
  .pill-dot-todo { background: var(--ink-300); }

  /* ============================================
     Buttons
     ============================================ */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    line-height: 1.4;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-primary { background: var(--ink-900); color: var(--paper); }
  .btn-primary:hover { background: var(--ink-700); }
  .btn-secondary { background: var(--paper-3); color: var(--ink-700); border-color: var(--ink-200); }
  .btn-secondary:hover { background: var(--paper-2); border-color: var(--ink-300); }
  .btn-ghost { background: transparent; color: var(--ink-500); }
  .btn-ghost:hover { background: var(--paper-2); color: var(--ink-900); }
  .btn-icon-subtle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 20px;
    border: none; background: transparent;
    color: var(--ink-300); cursor: pointer; border-radius: var(--radius-sm);
    transition: all 0.12s; padding: 0;
  }
  .btn-icon-subtle:hover:not(:disabled) { background: var(--ink-100); color: var(--ink-600); }
  .btn-icon-subtle:disabled { cursor: default; }
  .btn-icon-delete, .btn-icon-edit, .btn-icon-move {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; padding: 0;
    border-radius: var(--radius); border: 1px solid var(--ink-200);
    background: var(--paper-2); color: var(--ink-700);
    cursor: pointer; line-height: 1;
    transition: all 0.15s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-icon-delete:hover, .btn-icon-delete:active { background: var(--accent-clay-soft); color: var(--accent-clay); border-color: #E8B8A0; }
  .btn-icon-edit:hover, .btn-icon-edit:active { background: var(--accent-fog-soft); color: var(--accent-fog); border-color: #B8C7DE; }
  .btn-icon-move { width: 28px; height: 28px; }
  .btn-icon-move:hover, .btn-icon-move:active { background: var(--paper-3); border-color: var(--ink-300); color: var(--ink-900); }
  @media (max-width: 600px) {
    .btn-icon-delete, .btn-icon-edit { width: 36px; height: 36px; }
    .btn-icon-move { width: 32px; height: 32px; }
  }

  .btn-danger { background: transparent; color: var(--accent-clay); border-color: #E8B8A0; }
  .btn-danger:hover { background: var(--accent-clay-soft); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }


  /* ============================================
     Forms
     ============================================ */
  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink-500);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .input, .textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    background: var(--paper-3);
    color: var(--ink-900);
    line-height: 1.6;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input:focus, .textarea:focus {
    outline: none;
    border-color: var(--accent-ink);
    box-shadow: 0 0 0 3px rgba(31, 58, 95, 0.1);
  }
  .textarea { resize: vertical; min-height: 70px; }
  .textarea-lg { min-height: 100px; }

  /* ============================================
     Quant: Signal Cards
     ============================================ */
  .quant-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    background: var(--paper-3);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-sm);
  }
  @media (max-width: 720px) {
    .quant-summary { grid-template-columns: 1fr 1fr 1fr; }
    .quant-summary > .source-block { grid-column: 1 / -1; border-left: none; border-top: 1px solid var(--rule-soft); padding-left: 0; padding-top: 12px; margin-top: 4px; }
  }
  @media (max-width: 480px) {
    .quant-summary { grid-template-columns: 1fr 1fr; padding: 12px 14px; gap: 8px; }
    .quant-summary > .source-block { grid-column: 1 / -1; }
    .summary-block-value { font-size: 26px; }
  }
  .summary-block-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    color: var(--ink-500); text-transform: uppercase; margin-bottom: 6px;
  }
  .summary-block-value {
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
    color: var(--ink-900);
  }
  .summary-block-value.danger { color: var(--accent-clay); }
  .summary-block-value.success { color: var(--accent-moss); }
  .source-block {
    border-left: 1px solid var(--rule-soft);
    padding-left: 16px;
  }
  .source-link {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: var(--radius);
    background: var(--paper-2);
    color: var(--ink-700);
    border: 1px solid var(--rule-soft);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    margin-bottom: 4px;
    transition: all 0.15s;
    width: 100%;
    justify-content: flex-start;
  }
  .source-link:hover { background: var(--paper-3); border-color: var(--ink-300); }
  .source-link svg { color: var(--ink-400); }

  .theme-card {
    background: var(--paper-3);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius-lg);
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .theme-card.has-lit { border-color: #E8B8A0; }
  .theme-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .theme-head:hover { background: var(--paper-2); }
  .theme-icon {
    width: 36px; height: 36px;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .theme-icon-info { background: var(--accent-fog-soft); color: var(--accent-fog); }
  .theme-icon-success { background: var(--accent-moss-soft); color: var(--accent-moss); }
  .theme-icon-warn { background: var(--accent-gold-soft); color: var(--accent-gold); }
  .theme-info { flex: 1; min-width: 0; }
  .theme-title {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-900);
    line-height: 1.4;
  }
  .theme-source {
    font-size: 11px;
    color: var(--ink-400);
    margin-top: 2px;
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
  }
  .theme-meter {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-500);
    font-weight: 500;
  }
  .theme-meter.lit { color: var(--accent-clay); font-weight: 600; }
  .theme-chevron {
    color: var(--ink-300);
    transition: transform 0.2s;
    display: inline-flex; align-items: center;
  }
  .theme-card.expanded .theme-chevron { transform: rotate(180deg); }

  .theme-body {
    display: none;
    padding: 0 20px 16px;
    border-top: 1px solid var(--rule-soft);
  }
  .theme-card.expanded .theme-body { display: block; }

  .signal-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--rule-soft);
  }
  .signal-row:last-child { border-bottom: none; }
  .signal-indicator {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ink-200);
    margin-top: 6px;
    flex-shrink: 0;
    border: 2px solid var(--paper-3);
    box-shadow: 0 0 0 1px var(--ink-200);
  }
  .signal-indicator.yes {
    background: var(--accent-clay);
    box-shadow: 0 0 0 1px var(--accent-clay), 0 0 0 4px var(--accent-clay-soft);
  }
  .signal-indicator.no {
    background: var(--accent-moss);
    box-shadow: 0 0 0 1px var(--accent-moss);
  }
  .signal-indicator.unknown {
    background: var(--accent-gold);
    box-shadow: 0 0 0 1px var(--accent-gold), 0 0 0 4px var(--accent-gold-soft);
  }
  .signal-content { flex: 1; min-width: 0; }
  .signal-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-700);
  }
  .signal-text.yes { font-weight: 600; color: var(--ink-900); }
  .signal-text.no { color: var(--ink-400); text-decoration: line-through; text-decoration-color: var(--ink-200); }
  .signal-controls {
    display: flex; gap: 4px;
    flex-shrink: 0;
  }
  .sig-btn {
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    border-radius: var(--radius);
    border: 1px solid var(--ink-200);
    background: var(--paper-3);
    color: var(--ink-500);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 32px;
  }
  .sig-btn:hover { border-color: var(--ink-400); }
  @media (max-width: 600px) {
    .signal-row { gap: 8px; }
    .signal-controls { flex-direction: column; gap: 3px; }
    .sig-btn { padding: 4px 8px; font-size: 10px; }
  }
  .sig-btn.active-yes {
    background: var(--accent-clay);
    color: var(--paper);
    border-color: var(--accent-clay);
  }
  .sig-btn.active-no {
    background: var(--accent-moss);
    color: var(--paper);
    border-color: var(--accent-moss);
  }
  .sig-btn.active-unknown {
    background: var(--accent-gold);
    color: var(--paper);
    border-color: var(--accent-gold);
  }
  .discuss-toggle-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
    padding: 6px 10px;
    background: var(--paper-2);
    border-radius: var(--radius);
    border: 1px solid var(--rule-soft);
    font-size: 11px; color: var(--ink-700);
    font-weight: 500;
  }
  .discuss-toggle-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .discuss-toggle-row input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent-ink); cursor: pointer; }
  .discuss-toggle-row .toggle-label { flex: 1; }
  .discuss-toggle-row .toggle-hint { font-size: 10px; color: var(--ink-400); margin-left: 4px; }
  .signal-comment {
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--accent-clay-soft);
    border-left: 3px solid var(--accent-clay);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 12px;
  }
  .signal-comment textarea {
    width: 100%; min-height: 40px;
    border: none; background: transparent;
    font-family: inherit; font-size: 12px;
    color: var(--accent-clay-deep);
    resize: vertical;
    line-height: 1.6;
  }
  .signal-comment textarea:focus { outline: none; }
  .signal-comment textarea::placeholder { color: rgba(107, 43, 20, 0.5); }

  /* ============================================
     Pillar Cards
     ============================================ */
  .pillar-grid {
    display: grid;
    gap: 12px;
    margin-bottom: 28px;
  }
  .pillar-card {
    background: var(--paper-3);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  @media (max-width: 600px) {
    .pillar-card { padding: 12px 14px; }
    .pillar-head { flex-wrap: wrap; }
  }
  .pillar-card::before {
    content: '';
    position: absolute;
    left: 0; top: 16px; bottom: 16px;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .pillar-card.p1::before { background: var(--pillar-1); }
  .pillar-card.p2::before { background: var(--pillar-2); }
  .pillar-card.p3::before { background: var(--pillar-3); }
  .pillar-card.p4::before { background: var(--pillar-4); }
  .pillar-card.p5::before { background: var(--pillar-5); }
  .pillar-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .pillar-tag {
    font-family: var(--font-serif);
    font-size: 12px; font-weight: 600;
    padding: 3px 10px;
    border-radius: var(--radius-sm);
    letter-spacing: 0.05em;
  }
  .pillar-tag.p1 { background: var(--pillar-1-bg); color: var(--pillar-1); }
  .pillar-tag.p2 { background: var(--pillar-2-bg); color: var(--pillar-2); }
  .pillar-tag.p3 { background: var(--pillar-3-bg); color: var(--pillar-3); }
  .pillar-tag.p4 { background: var(--pillar-4-bg); color: var(--pillar-4); }
  .pillar-tag.p5 { background: var(--pillar-5-bg); color: var(--pillar-5); }
  .pillar-name {
    font-family: var(--font-serif);
    font-size: 14px; font-weight: 600;
    color: var(--ink-900);
    flex: 1;
  }
  .pillar-author {
    font-size: 11px; color: var(--ink-400);
    display: flex; align-items: center; gap: 5px;
  }

  /* ============================================
     Topic Cards
     ============================================ */
  .topic-card {
    background: var(--paper-3);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .topic-head {
    display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px;
  }
  @media (max-width: 600px) {
    .topic-card { padding: 12px 14px; }
    .topic-body { margin-left: 0; }
  }
  .topic-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-900);
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .topic-input:focus {
    outline: none;
    border-bottom-color: var(--accent-ink);
  }
  .topic-input::placeholder { color: var(--ink-300); font-style: italic; }
  .topic-body { margin-left: 38px; }

  /* ============================================
     Person Selector
     ============================================ */
  .person-selector {
    display: flex; gap: 6px;
    background: var(--paper-3);
    border: 1px solid var(--rule-soft);
    padding: 6px;
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    box-shadow: var(--shadow-sm);
    flex-wrap: wrap;
  }
  .person-pill {
    flex: 1;
    min-width: 90px;
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    border-radius: var(--radius);
    background: transparent;
    color: var(--ink-500);
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .person-pill:hover { background: var(--paper-2); }
  .person-pill:active { background: var(--ink-900); color: var(--paper); }
  .person-pill.active {
    background: var(--ink-900);
    color: var(--paper);
  }
  .person-pill.active .avatar { border-color: var(--paper); }

  /* ============================================
     Meeting Page
     ============================================ */
  .session-banner {
    display: flex; align-items: center; gap: 16px;
    margin: 28px 0 16px;
    padding: 12px 20px;
    background: linear-gradient(90deg, var(--paper-3) 0%, var(--paper-2) 100%);
    border-radius: var(--radius);
    border-left: 4px solid var(--accent-ink);
  }
  .session-banner.first { margin-top: 0; }
  .session-banner-num {
    font-family: var(--font-serif);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .session-banner-title {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--ink-900);
  }
  .session-banner-desc {
    font-size: 12px;
    color: var(--ink-500);
    margin-top: 2px;
  }
  .session-banner-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-ink);
    padding: 4px 12px;
    background: var(--accent-fog-soft);
    border-radius: 999px;
  }

  .agenda-item {
    background: var(--paper-3);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius-lg);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: opacity 0.2s, border-color 0.2s;
  }
  .agenda-item.discussion-done {
    opacity: 0.45;
    border-color: var(--rule-soft);
    border-style: dashed;
  }
  .agenda-item.discussion-done .agenda-head {
    background: var(--paper);
  }
  .agenda-done-btn {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    font-size: 11px; font-weight: 600;
    border-radius: 999px;
    border: 1px solid var(--ink-200);
    background: var(--paper-3);
    color: var(--ink-500);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .agenda-done-btn:hover { border-color: var(--accent-moss); color: var(--accent-moss); background: var(--accent-moss-soft); }
  .agenda-done-btn.done {
    background: var(--accent-moss-soft);
    color: var(--accent-moss-deep);
    border-color: #C5D9A4;
  }
  .agenda-head {
    padding: 14px 20px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule-soft);
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  .agenda-head .signal-indicator { margin-top: 0; width: 12px; height: 12px; }
  .agenda-title {
    font-family: var(--font-serif);
    font-size: 14px; font-weight: 600;
    color: var(--ink-900);
    flex: 1;
    line-height: 1.5;
  }
  .agenda-body { padding: 16px 20px; }
  @media (max-width: 600px) {
    .agenda-head { padding: 12px 14px; gap: 8px; flex-wrap: wrap; }
    .agenda-body { padding: 12px 14px; }
    .agenda-done-btn { font-size: 10px; padding: 4px 8px; }
    .session-banner { padding: 10px 14px; gap: 10px; }
  }
  .agenda-context {
    font-size: 12px;
    background: var(--paper-2);
    padding: 10px 14px;
    border-radius: var(--radius);
    margin-bottom: 16px;
    color: var(--ink-700);
    line-height: 1.7;
    border-left: 2px solid var(--ink-200);
  }
  .agenda-context-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--ink-500);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .agenda-field { margin-bottom: 14px; }
  .agenda-field:last-child { margin-bottom: 0; }

  /* ============================================
     Inline Action Card
     ============================================ */
  .inline-action {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--paper-2);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius);
    margin-bottom: 6px;
    font-size: 12px;
  }
  .inline-action-text { flex: 1; color: var(--ink-900); font-weight: 500; }
  .inline-action-meta { font-size: 11px; color: var(--ink-400); }

  /* ============================================
     Action List
     ============================================ */
  .filter-pills {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-pill {
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--ink-200);
    background: var(--paper-3);
    color: var(--ink-500);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 34px;
    display: flex; align-items: center;
  }
  .filter-pill:hover { border-color: var(--ink-400); }
  .filter-pill.active {
    background: var(--ink-900);
    color: var(--paper);
    border-color: var(--ink-900);
  }
  .filter-pill.danger.has-count {
    background: var(--accent-clay-soft);
    color: var(--accent-clay-deep);
    border-color: #E8B8A0;
  }
  .filter-pill.danger.has-count.active {
    background: var(--accent-clay);
    color: var(--paper);
    border-color: var(--accent-clay);
  }
  .filter-pill .count {
    font-family: var(--font-mono);
    font-size: 10px;
    margin-left: 4px;
    opacity: 0.7;
  }

  .action-list-card {
    background: var(--paper-3);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .action-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 14px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--rule-soft);
    transition: background 0.15s;
  }
  .action-row:last-child { border-bottom: none; }
  .action-row.near-due { background: rgba(245, 235, 208, 0.45); }
  .action-row:hover { background: var(--paper-2); }
  .action-status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .action-title {
    font-size: 14px; font-weight: 500; color: var(--ink-900);
    line-height: 1.5;
  }
  .action-title.done {
    color: var(--ink-400);
    text-decoration: line-through;
    text-decoration-color: var(--ink-300);
  }
  .action-meta {
    font-size: 11px;
    color: var(--ink-500);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .action-meta .meta-sep { color: var(--ink-200); }

  .status-select {
    padding: 4px 8px;
    font-size: 11px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    background: var(--paper-3);
    font-family: inherit;
    color: var(--ink-700);
    cursor: pointer;
  }
  @media (max-width: 600px) {
    .action-row {
      grid-template-columns: auto 1fr !important;
      grid-template-rows: auto auto;
      gap: 8px 12px;
    }
    .action-row > div:first-of-type { /* pill */
      grid-column: 1; grid-row: 1;
    }
    .action-row > div:nth-of-type(2) { /* content */
      grid-column: 2; grid-row: 1;
    }
    .action-row .status-select {
      grid-column: 2; grid-row: 2; justify-self: start;
    }
    .action-row .btn-icon-edit,
    .action-row .btn-icon-delete {
      grid-row: 1;
      align-self: start;
    }
  }

  /* ============================================
     Log Page
     ============================================ */
  .log-entry {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  @media (max-width: 600px) {
    .log-entry { padding: 12px 14px; gap: 10px; }
    .log-date-block { width: 40px; padding-right: 10px; }
    .log-date-day { font-size: 20px; }
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry:hover { background: var(--paper-2); }
  .log-date-block {
    text-align: center;
    width: 50px;
    padding: 6px 0;
    border-right: 1px solid var(--rule-soft);
    padding-right: 14px;
  }
  .log-date-mon {
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--ink-400); text-transform: uppercase;
    font-weight: 600;
  }
  .log-date-day {
    font-family: var(--font-serif);
    font-size: 24px; font-weight: 600;
    color: var(--ink-900);
    line-height: 1;
    margin-top: 2px;
  }
  .log-title {
    font-family: var(--font-serif);
    font-size: 15px; font-weight: 600;
    color: var(--ink-900);
  }
  .log-meta {
    font-size: 11px; color: var(--ink-500);
    margin-top: 4px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .log-meta-item { display: flex; align-items: center; gap: 4px; }
  .log-meta-item svg { color: var(--ink-400); }

  /* ============================================
     Modals
     ============================================ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26, 31, 46, 0.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal {
    background: var(--paper);
    border-radius: var(--radius-xl);
    max-width: 540px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.2s ease;
  }
  @media (max-width: 600px) {
    .modal-backdrop { padding: 0; align-items: flex-end; }
    .modal {
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      max-height: 92vh;
      width: 100%;
    }
    .modal-head { padding: 16px 18px; }
    .modal-body { padding: 16px 18px; }
    .modal-foot { padding: 12px 18px; }
  }
  .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: var(--font-serif);
    font-size: 17px; font-weight: 600;
    color: var(--ink-900);
  }
  .modal-body { padding: 20px 24px; }
  .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--rule);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal-field { margin-bottom: 16px; }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--ink-400);
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--ink-900); }

  /* ============================================
     Log Detail Modal
     ============================================ */
  .log-section {
    margin-bottom: 20px;
  }
  .log-section-title {
    font-family: var(--font-serif);
    font-size: 13px; font-weight: 600;
    color: var(--accent-gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rule);
  }
  .log-item {
    padding: 10px 0;
    border-bottom: 1px dashed var(--rule-soft);
    font-size: 13px;
    line-height: 1.7;
  }
  .log-item:last-child { border-bottom: none; }
  .log-item-title {
    font-weight: 600;
    color: var(--ink-900);
    margin-bottom: 4px;
  }
  .log-item-comment {
    color: var(--ink-700);
    font-size: 12px;
    padding-left: 12px;
    border-left: 2px solid var(--rule);
    margin-top: 4px;
  }

  /* ============================================
     Empty States
     ============================================ */
  .empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--ink-400);
    font-size: 13px;
  }
  .empty svg { color: var(--ink-300); display: block; margin: 0 auto 12px; opacity: 0.6; }

  /* ============================================
     Page Intro
     ============================================ */
  .page-intro {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .page-intro-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .page-intro-title {
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 600;
    color: var(--ink-900);
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }
  .page-intro-desc {
    font-size: 13px;
    color: var(--ink-500);
    line-height: 1.7;
    max-width: 680px;
  }

  /* ============================================
     Utility
     ============================================ */
  .flex-row { display: flex; align-items: center; gap: 8px; }
  .mb-0 { margin-bottom: 0; }
  .mt-md { margin-top: 16px; }
  .mt-lg { margin-top: 24px; }
  .text-mono { font-family: var(--font-mono); }
  .text-serif { font-family: var(--font-serif); }

  /* ============================================
     複数人コメント UI
     ============================================ */
  /* 5本柱: 複数コメントリスト */
  .pillar-comments { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .pillar-comment-item {
    border-radius: var(--radius);
    border: 1px solid var(--rule-soft);
    overflow: hidden;
  }
  .pillar-comment-header {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule-soft);
  }
  .pillar-comment-author { font-size: 12px; font-weight: 600; color: var(--ink-700); flex: 1; }
  .pillar-comment-body { padding: 0; }
  .pillar-comment-body textarea {
    width: 100%; border: none; background: var(--paper-3);
    font-family: inherit; font-size: 13px; color: var(--ink-900);
    padding: 10px 12px; resize: vertical; min-height: 60px; line-height: 1.6;
  }
  .pillar-comment-body textarea:focus { outline: none; background: #FFFEF9; }
  .pillar-comment-body textarea:disabled {
    background: var(--paper-2); color: var(--ink-500); cursor: default; resize: none;
  }
  .pillar-add-comment {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: var(--paper-2);
    border: 1px dashed var(--ink-200);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px; color: var(--ink-400);
    font-family: inherit; font-weight: 500;
    transition: all 0.15s;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .pillar-add-comment:hover { border-color: var(--accent-ink); color: var(--accent-ink); background: var(--accent-fog-soft); }

  /* 論点: スレッド形式 */
  .topic-thread { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .thread-comment {
    display: flex; gap: 10px; align-items: flex-start;
  }
  .thread-comment-body {
    flex: 1; min-width: 0;
    background: var(--paper-2);
    border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
    border: 1px solid var(--rule-soft);
    overflow: hidden;
  }
  .thread-comment-body.is-mine {
    background: var(--paper-3);
    border-color: var(--accent-ink);
    border-opacity: 0.3;
  }
  .thread-comment-meta {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px 4px;
    font-size: 11px; font-weight: 600; color: var(--ink-500);
  }
  .thread-comment-meta .mine-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 999px;
    background: var(--accent-fog-soft); color: var(--accent-fog);
    font-weight: 600;
  }
  .thread-comment-text {
    padding: 0 12px 10px;
    font-size: 13px; color: var(--ink-900); line-height: 1.6;
  }
  .thread-comment-textarea {
    width: 100%; border: none; background: transparent;
    font-family: inherit; font-size: 13px; color: var(--ink-900);
    padding: 0 12px 10px; resize: vertical; min-height: 52px; line-height: 1.6;
    display: block;
  }
  .thread-comment-textarea:focus { outline: none; }
  .thread-add-row {
    display: flex; gap: 10px; align-items: flex-start; margin-top: 4px;
  }
  .thread-add-input-wrap {
    flex: 1;
    background: var(--paper-3);
    border: 1px dashed var(--ink-200);
    border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .thread-add-input-wrap:focus-within { border-color: var(--accent-ink); border-style: solid; }
  .thread-add-input-wrap textarea {
    width: 100%; border: none; background: transparent;
    font-family: inherit; font-size: 13px; color: var(--ink-900);
    padding: 8px 12px; resize: none; min-height: 44px; line-height: 1.6;
  }
  .thread-add-input-wrap textarea:focus { outline: none; }
  .thread-add-input-wrap textarea::placeholder { color: var(--ink-300); }
  .thread-add-actions {
    display: flex; justify-content: flex-end; gap: 6px;
    padding: 4px 8px 6px;
    border-top: 1px solid var(--rule-soft);
  }
  /* 論点: タイトル部分で誰がどの論点を立てたか */
  .topic-author-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--ink-500); margin-bottom: 8px;
    padding-bottom: 8px; border-bottom: 1px solid var(--rule-soft);
  }
  .topic-author-row .author-label { font-weight: 600; color: var(--ink-700); }


  /* ============================================
     同期インジケーター
     ============================================ */
  .sync-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule-soft);
    font-size: 11px; color: var(--ink-400);
    font-family: var(--font-mono);
    position: sticky; top: 57px; z-index: 9;
  }
  @media (max-width: 880px) { .sync-bar { top: 49px; } }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ink-200); flex-shrink: 0;
    transition: background 0.4s;
  }
  .sync-dot.syncing { background: var(--accent-gold); animation: pulse-dot 1s ease infinite; }
  .sync-dot.updated { background: var(--accent-moss); }
  .sync-dot.error   { background: var(--accent-clay); }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  .sync-label { flex: 1; }
  .sync-refresh-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: var(--radius);
    border: 1px solid var(--ink-200); background: var(--paper-3);
    color: var(--ink-500); font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .sync-refresh-btn:hover { border-color: var(--ink-400); color: var(--ink-900); }
  .sync-refresh-btn:active { background: var(--paper-2); }
  .sync-refresh-btn svg { transition: transform 0.5s; }
  .sync-refresh-btn.spinning svg { transform: rotate(360deg); }
  /* ============================================
     使い方ページ
     ============================================ */
  .howto-section {
    background: var(--paper-3);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  .howto-section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .howto-step-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--ink-100);
    color: var(--ink-500);
    flex-shrink: 0;
  }
  .howto-step-1 { background: #DEE6F2; color: #1F3A5F; }
  .howto-step-2 { background: #D9EDE5; color: #1F6B5A; }
  .howto-step-3 { background: #F5EBD0; color: #7a5c10; }
  .howto-step-faq { background: var(--ink-100); color: var(--ink-600); }
  .howto-section-title {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--ink-900);
  }
  .howto-desc {
    font-size: 13px;
    color: var(--ink-700);
    line-height: 1.8;
    margin-bottom: 18px;
  }
  .howto-tip {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--accent-gold-soft);
    border-left: 3px solid var(--accent-gold);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--ink-700);
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .howto-tip svg { color: var(--accent-gold); margin-top: 2px; }
  /* 2カラムレイアウト */
  .howto-two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 680px) {
    .howto-two-col { grid-template-columns: 1fr; }
  }
  .howto-card {
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .howto-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
  }
  .howto-card-quant { background: #DEE6F2; color: #1F3A5F; }
  .howto-card-qual  { background: #D9EDE5; color: #1F6B5A; }
  .howto-card-body {
    padding: 16px;
    background: var(--paper-2);
  }
  .howto-ol {
    margin: 0 0 14px 0;
    padding-left: 20px;
    font-size: 13px;
    color: var(--ink-700);
    line-height: 2;
  }
  /* 図 */
  .howto-figure-wrap {
    margin-bottom: 18px;
  }
  .howto-svg {
    width: 100%;
    height: auto;
    display: block;
    border-radius: var(--radius);
    border: 1px solid var(--rule-soft);
  }
  .howto-svg-inline {
    width: 100%;
    height: auto;
    display: block;
    border-radius: var(--radius);
    border: 1px solid var(--rule-soft);
    margin-bottom: 6px;
  }
  .howto-figure-caption {
    font-size: 11px;
    color: var(--ink-400);
    text-align: center;
    margin-top: 6px;
  }
  /* FAQ グリッド */
  .howto-faq-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) {
    .howto-faq-grid { grid-template-columns: 1fr; }
    .howto-section { padding: 16px; }
  }
  .howto-faq-item {
    background: var(--paper-2);
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .howto-faq-q {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-900);
    margin-bottom: 6px;
  }
  .howto-faq-a {
    font-size: 12px;
    color: var(--ink-600);
    line-height: 1.7;
  }

  /* ============================================
     定量サマリーパート（シグナルから読み取れること）
     ============================================ */
  .quant-insight-card {
    background: var(--paper-2);
    border: 1.5px solid var(--accent-fog);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .quant-insight-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .quant-insight-title {
    display: flex;
    align-items: center;

function getNextMeetingDate() {
  const settings = (state && state.meetingSettings) || { intervalWeeks: 1, dayOfWeek: 5 };
  const targetDay = settings.dayOfWeek;
  const d = new Date();
  let diff = targetDay - d.getDay();
  if (diff <= 0) diff += 7;
  d.setDate(d.getDate() + diff);
  if (settings.intervalWeeks > 1) d.setDate(d.getDate() + (settings.intervalWeeks - 1) * 7);
  return d.toISOString().slice(0,10);
}

function getNextFriday() {
  const d = new Date();
  const day = d.getDay();
  const diff = (5 - day + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}
function getLastFriday() {
  const d = new Date();
  const day = d.getDay();
  const diff = (day + 2) % 7 || 7;
  d.setDate(d.getDate() - diff);
  return d.toISOString().slice(0, 10);
}
function getTwoFridaysAgo() {
  const d = new Date();
  const day = d.getDay();
  const diff = (day + 2) % 7 || 7;
  d.setDate(d.getDate() - diff - 7);
  return d.toISOString().slice(0, 10);
}

async function loadState() {
  const fetchWithTimeout = (url, opts, ms) => {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    return fetch(url, { ...opts, signal: controller.signal }).finally(() => clearTimeout(timer));
  };
  try {
    const res = await fetchWithTimeout(GAS_URL + '?action=get', { mode: 'cors' }, 8000);
    const json = await res.json();
    if (json.ok && json.value) {
      state = JSON.parse(json.value);
      return;
    }
  } catch (e) {
    console.warn('GAS load失敗:', e.name === 'AbortError' ? 'タイムアウト' : e.message);
  }
  // GAS失敗時: 0526定例データを初期値として使用
  state = INITIAL_DATA;
  await saveState();
}
async function saveState() {
  const json = JSON.stringify(state);
  try {
    // text/plain でPOST → CORSプリフライト不要、データサイズ制限なし
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ value: json }),
    });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'save failed');
  } catch (e) {
    console.error('GAS保存失敗:', e);
  }
}
async function resetData() {
  closeModal();
  if (!confirm('すべてのデータを初期サンプルにリセットしますか？\n現在の入力内容は失われます。')) return;
  state = createSampleData();
  await saveState();
  renderAll();
}

function getCurrentMeeting() { return state.currentMeetingId ? state.meetings[state.currentMeetingId] : null; }
function getPerson(id) { return PERSONS.find(p => p.id === id) || { name: '—', initial: '?', avatarClass: 'avatar-1' }; }
function getPillar(id) { return PILLARS.find(p => p.id === id) || null; }

function getAssigneeIds(a) {
  if (a.assigneeIds && Array.isArray(a.assigneeIds)) return a.assigneeIds;
  if (a.assigneeId) return [a.assigneeId];
  return [];
}

}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function formatDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function formatDateMonDay(iso) {
  if (!iso) return { mon: '—', day: '—' };
  const d = new Date(iso);
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return { mon: months[d.getMonth()], day: String(d.getDate()) };
}
function daysUntil(iso) {
  if (!iso) return null;
  const t = new Date(iso); const td = new Date();
  td.setHours(0,0,0,0); t.setHours(0,0,0,0);
  return Math.round((t - td) / 86400000);
}
function isOverdue(action) {
  if (action.status === 'done') return false;
  const days = daysUntil(action.deadline);
  return days !== null && days < 0;
}
function getActiveSignalIds() {
  const ids = new Set();
  const themes = (state && state.customSignals) ? getEffectiveSignalThemes() : SIGNAL_THEMES;
  for (const t of themes) {
    for (const s of t.signals) {
      if (!s._deleted) ids.add(s.id);
    }
  }
  return ids;
}
function countLitSignals(m) {
  if (!m || !m.signals) return 0;
  const active = getActiveSignalIds();
  return Object.entries(m.signals).filter(([k,s]) =>
    active.has(k) && s.state === 'yes'
  ).length;
}
function countNoSignals(m) {
  if (!m || !m.signals) return 0;
  const active = getActiveSignalIds();
  return Object.entries(m.signals).filter(([k,s]) => active.has(k) && s.state === 'no').length;
}
function totalSignalCount() {
  return getActiveSignalIds().size;
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

              シグナルから読み取れること

            <span class="quant-insight-badge">${litList.reduce((s,t)=>s+t.signals.length,0)}件 点灯</span>
          </div>

          ` : `
            <div class="quant-insight-list">
              ${litList.map(({theme, signals}) => `
                <div class="quant-insight-theme">
                  <div class="quant-insight-theme-label">${theme.num} ${escapeHtml(theme.name)}</div>
                  <ul class="quant-insight-signals">
                    ${signals.map(sig => `
                      <li>
                        <span class="signal-indicator yes" style="width:7px;height:7px;flex-shrink:0;margin-top:5px;"></span>
                        <span>${escapeHtml(sig.text)}</span>

                  </ul>
                </div>

          `}

          <div class="quant-insight-prompt">

            <span>上記を踏まえて考えてみてください：<strong>商談数・商談内容・商談先・見積スピード・見積内容・見積後フォロー</strong>のどこを改善すべきか。また、担当者ごとに改善点があるのか、それとも全社的な改善点なのか。</span>
          </div>

          <div class="quant-insight-input-area">
            <div class="quant-insight-input-label">解釈・コメント（編集可）</div>
            <textarea class="textarea" id="quant-summary-textarea" placeholder="点灯シグナルから読み取れること、課題のポイント、改善すべきプロセスを記入..."

        <button class="source-link" onclick="alert('運用開始時にURLを設定します')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>CAUL売上実績</button>

        </div>
        <div class="theme-info">
          <div class="theme-title">⑥ その他気になった数字</div>
          <div class="theme-source">自由記述欄</div>
        </div>
      </div>
      <div class="theme-body" style="display: block;">
        <textarea class="textarea" style="margin-top: 12px;" placeholder="上記5テーマに当てはまらないが気になった数字を自由に記入"
          onchange="updateFreeNumber(this.value)">${escapeHtml(m.freeNumberComment || '')}</textarea>
      </div>
    </div>
  `;
}

function renderThemeCard(theme, m) {
  const activeSignals = theme.signals.filter(s => !s._deleted);
  const lit = activeSignals.filter(s => (m.signals[s.id] || {}).state === 'yes').length;
  const set = activeSignals.filter(s => (m.signals[s.id] || {}).state).length;
  const isExpanded = expandedThemes.has(theme.id);

  return `
    <div class="theme-card ${isExpanded ? 'expanded' : ''} ${lit > 0 ? 'has-lit' : ''}">
      <div class="theme-head" onclick="toggleTheme('${theme.id}')">
        <div class="theme-icon ${theme.iconClass}">${getThemeSvg(theme.icon)}</div>
        <div class="theme-info">
          <div class="theme-title">${theme.num} ${escapeHtml(theme.name)}</div>
          <div class="theme-source">${escapeHtml(theme.source)} · ${set}/${activeSignals.length}件 確認済み</div>
        </div>
        <div class="theme-meter ${lit > 0 ? 'lit' : ''}">
          ${lit > 0 ? `<span class="signal-indicator yes" style="width:8px;height:8px;margin:0;box-shadow:none;border:none;"></span>${lit}件 点灯` : '点灯なし'}
        </div>
        <span class="theme-chevron" style="display:inline-flex;align-items:center;color:var(--ink-300);"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      </div>
      <div class="theme-body">
        ${theme.signals.filter(s => !s._deleted).map(sig => renderSignal(sig, m)).join('')}
      </div>
    </div>
  `;
}

function renderSignal(sig, m) {
  const data = m.signals[sig.id] || {};
  const st = data.state;
  const indicatorClass = st === 'yes' ? 'yes' : st === 'no' ? 'no' : '';
  const textClass = st === 'yes' ? 'yes' : st === 'no' ? 'no' : '';
  return `
    <div class="signal-row">
      <span class="signal-indicator ${indicatorClass}"></span>
      <div class="signal-content">
        <div class="signal-text ${textClass}">${escapeHtml(sig.text)}</div>
        ${st === 'yes' ? `
          <div class="signal-comment">
            <textarea placeholder="補足コメント（任意） — 数字の背景や具体的な案件名、気になる点があれば"
              onchange="updateSignalComment('${sig.id}', this.value)">${escapeHtml(data.comment || '')}</textarea>
          </div>
        ` : ''}
      </div>
      <div class="signal-controls">
        <button class="sig-btn ${st === 'yes' ? 'active-yes' : ''}" onclick="setSignal('${sig.id}', 'yes')">あり</button>
        <button class="sig-btn ${st === 'no' ? 'active-no' : ''}" onclick="setSignal('${sig.id}', 'no')">なし</button>
      </div>
    </div>
  `;
}

function toggleTheme(themeId) {
  if (expandedThemes.has(themeId)) expandedThemes.delete(themeId);
  else expandedThemes.add(themeId);
  renderPage();
}

async function setSignal(signalId, newState) {
  const m = getCurrentMeeting();
  if (!m.signals[signalId]) m.signals[signalId] = {};
  if (m.signals[signalId].state === newState) {
    delete m.signals[signalId].state;
  } else {
    m.signals[signalId].state = newState;
  }
  await saveState();
  renderAll();
}

async function updateSignalComment(signalId, value) {
  const m = getCurrentMeeting();
  if (!m.signals[signalId]) m.signals[signalId] = {};
  m.signals[signalId].comment = value;
  await saveState();
}

async function setSignalDiscuss(signalId, value) {
  const m = getCurrentMeeting();
  if (!m.signals[signalId]) m.signals[signalId] = {};
  m.signals[signalId].discussInMeeting = value;
  await saveState();
  renderPage();
}

async function updateQuantSummary(value) {
  const m = getCurrentMeeting();
  m.quantSummary = value;
  await saveState();
}

async function updateFreeNumber(value) {
  const m = getCurrentMeeting();
  m.freeNumberComment = value;
  await saveState();
}

async function resetCurrentSignals() {
  if (!confirm('今回の定例のシグナル入力（すべてのあり/なし回答とコメント）をリセットしますか？')) return;
  const m = getCurrentMeeting();
  m.signals = {};
  m.freeNumberComment = '';
  await saveState();
  renderPage();
}

async function setCurrentUser(id) {
  state.currentUserId = id;
  await saveState();
  renderSidebarUserSwitcher();
  renderPage();
}
function getPillarComments(m, pillarId) {
  const v = m.pillarUpdates[pillarId];
  if (!v) return [];
  // 後方互換: 旧形式 {authorId, text} → 配列に変換
  if (!Array.isArray(v)) return [v];
  return v;
}
async function updatePillarComment(pillarId, value) {
  const m = getCurrentMeeting();
  const cur = state.currentUserId;
  const comments = getPillarComments(m, pillarId);
  const existing = comments.find(c => c.authorId === cur);
  if (!value.trim()) {
    // 空にしたら自分のコメントを削除
    m.pillarUpdates[pillarId] = comments.filter(c => c.authorId !== cur);
    if (m.pillarUpdates[pillarId].length === 0) delete m.pillarUpdates[pillarId];
  } else if (existing) {
    existing.text = value;
    m.pillarUpdates[pillarId] = comments;
  } else {
    m.pillarUpdates[pillarId] = [...comments, { authorId: cur, text: value }];
  }
  await saveState();
  renderSidebarNav();
  renderMobileNav();
}
async function addTopic() {
  const m = getCurrentMeeting();
  m.topics = m.topics || [];
  m.topics.push({
    id: 'topic_' + Date.now(),
    authorId: state.currentUserId,
    title: '',
    comments: [],
    transcript: '', conclusion: '', actions: []
  });
  await saveState();
  renderPage();
}
async function updateTopic(topicId, field, value) {
  const m = getCurrentMeeting();
  const t = (m.topics || []).find(x => x.id === topicId);
  if (t) {
    t[field] = value;
    await saveState();
  }
}
async function deleteTopic(topicId) {
  if (!confirm('この論点を削除しますか？')) return;
  const m = getCurrentMeeting();
  m.topics = (m.topics || []).filter(t => t.id !== topicId);
  await saveState();
  renderPage();
}
async function addTopicComment(topicId) {
  const m = getCurrentMeeting();
  const t = (m.topics || []).find(x => x.id === topicId);
  if (!t) return;
  const el = document.getElementById('new-comment-' + topicId);
  const text = el ? el.value.trim() : '';
  if (!text) return;
  t.comments = t.comments || [];
  t.comments.push({
    id: 'c_' + Date.now(),
    authorId: state.currentUserId,
    text
  });
  await saveState();
  renderPage();
}
async function updateTopicComment(topicId, commentId, value) {
  const m = getCurrentMeeting();
  const t = (m.topics || []).find(x => x.id === topicId);
  if (!t) return;
  const c = (t.comments || []).find(x => x.id === commentId);
  if (c) {
    c.text = value;
    await saveState();
  }
}
async function moveTopic(topicId, dir) {
  const m = getCurrentMeeting();
  const topics = m.topics || [];
  const idx = topics.findIndex(t => t.id === topicId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= topics.length) return;
  const tmp = topics[idx];
  topics[idx] = topics[newIdx];
  topics[newIdx] = tmp;
  m.topics = topics;
  await saveState();
  renderPage();
}

function renderMeeting() {

function renderInlineAction(actionId) {
  const a = state.actions.find(x => x.id === actionId);
  if (!a) return '';
  const overdue = isOverdue(a);
  const pill = a.status === 'done' ? '<span class="pill pill-success">完了</span>'
    : overdue ? '<span class="pill pill-danger">超過</span>'
    : a.status === 'in_progress' ? '<span class="pill pill-info">進行中</span>'
    : '<span class="pill pill-todo">未着手</span>';
  return `
    <div class="inline-action">
      ${pill}
      <div style="flex: 1;">
        <div class="inline-action-text">${escapeHtml(a.title)}</div>
        <div class="inline-action-meta">${escapeHtml(getAssigneeNames(a))} ・ 期限 ${formatDateShort(a.deadline)}</div>
      </div>
    </div>
  `;
}

async function updateSignalDiscussion(signalId, field, value) {
  const m = getCurrentMeeting();
  if (!m.signalDiscussions[signalId]) m.signalDiscussions[signalId] = { transcript: '', conclusion: '', actions: [] };
  m.signalDiscussions[signalId][field] = value;
  await saveState();
}

async function toggleAgendaDone(type, id) {
  const m = getCurrentMeeting();
  if (type === 'signal') {
    if (!m.signalDiscussions[id]) m.signalDiscussions[id] = { transcript: '', conclusion: '', actions: [] };
    m.signalDiscussions[id].done = !m.signalDiscussions[id].done;
  } else if (type === 'topic') {
    const t = (m.topics || []).find(x => x.id === id);
    if (t) t.done = !t.done;
  }
  await saveState();
  renderPage();
}

function openMeetingSummaryModal() {
  const m = getCurrentMeeting();
  const effectiveThemesMtg = (state && state.customSignals) ? getEffectiveSignalThemes() : SIGNAL_THEMES;
  // 点灯シグナル集計
  const litByTheme = [];
  for (const theme of effectiveThemesMtg) {
    const themeSignals = [];
    for (const sig of theme.signals) {
      if (sig._deleted) continue;
      const data = m.signals[sig.id];
      if (!data || data.state !== 'yes') continue;
      themeSignals.push(sig);
    }
    if (themeSignals.length > 0) litByTheme.push({ theme, signals: themeSignals });
  }
  const totalLit = litByTheme.reduce((s, t) => s + t.signals.length, 0);
  const litSignals = []; // 後方互換用（未使用）
  for (const theme of effectiveThemesMtg) {
    for (const sig of theme.signals) {
      if (sig._deleted) continue;
      const data = m.signals[sig.id];
      if (!data) continue;
      if ((data.state === 'yes' || data.state === 'unknown') && data.discussInMeeting !== false) {
        const disc = (m.signalDiscussions || {})[sig.id] || {};
        litSignals.push({ sig, theme, disc });
      }
    }
  }
  const topics = m.topics || [];
  const actions = state.actions.filter(a => a.meetingId === state.currentMeetingId);

  const quantDiscModal = (m.signalDiscussions || {})['__quant_summary__'] || {};
  const signalRows = totalLit > 0 ? `
    <div class="log-item">
      <div class="log-item-title" style="color:var(--accent-ink);">定量レビュー（${totalLit}件 点灯）</div>
      ${m.quantSummary ? `<div class="log-item-comment"><strong>読み取り：</strong>${escapeHtml(m.quantSummary)}</div>` : ''}
      ${quantDiscModal.conclusion
        ? `<div class="log-item-comment"><strong>結論：</strong>${escapeHtml(quantDiscModal.conclusion)}</div>`
        : `<div class="log-item-comment" style="color:var(--ink-300);font-style:italic;">結論未記入</div>`}
    </div>
  ` : '';

  const topicRows = topics.map(t => `
    <div class="log-item">
      <div class="log-item-title">${escapeHtml(t.title || '（無題）')} <span style="font-weight:400;font-size:11px;color:var(--ink-400);">— ${escapeHtml(getPerson(t.authorId).name)}</span></div>
      ${t.conclusion
        ? `<div class="log-item-comment"><strong>結論：</strong>${escapeHtml(t.conclusion)}</div>`
        : `<div class="log-item-comment" style="color:var(--ink-300);font-style:italic;">結論未記入</div>`}
    </div>
  `).join('');

  const actionRows = actions.length === 0
    ? '<div style="color:var(--ink-400);font-size:13px;">なし</div>'
    : actions.map(a => {
        const pill = a.status === 'done'
          ? '<span class="pill pill-success">完了</span>'
          : '<span class="pill pill-todo">未着手</span>';
        return `<div class="log-item" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          ${pill}
          <span style="font-weight:600;font-size:13px;flex:1;">${escapeHtml(a.title)}</span>
          <span style="font-size:11px;color:var(--ink-500);">${escapeHtml(getAssigneeNames(a))} ／ ${formatDateShort(a.deadline)}</span>
        </div>`;
      }).join('');

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:680px;">
        <div class="modal-head">
          <div>
            <div class="modal-title">今日のまとめ</div>
            <div style="font-size:11px;color:var(--ink-400);margin-top:2px;font-family:var(--font-mono);">${escapeHtml(m.title)} — ${formatDate(m.date)}</div>
          </div>
          <button class="modal-close" onclick="closeModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
          ${totalLit > 0 ? `
            <div class="log-section">
              <div class="log-section-title">定量レビュー（${totalLit}件 点灯）</div>
              ${signalRows}
            </div>
          ` : ''}
          ${topics.length > 0 ? `
            <div class="log-section">
              <div class="log-section-title">論点（${topics.length}件）</div>
              ${topicRows}
            </div>
          ` : ''}
          <div class="log-section">
            <div class="log-section-title">アクション（${actions.length}件）</div>
            ${actionRows}
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">閉じる</button>
        </div>
      </div>
    </div>
  `;
}

                  <div class="avatar avatar-xs ${p.avatarClass}">${p.initial}</div>
