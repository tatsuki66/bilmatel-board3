                </label>
              `).join('')}
            </div>
          </div>
          <div class="modal-field">
            <div class="field-label">期限</div>
            <input type="date" class="input" id="act-deadline" value="${dStr}">
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
          <button class="btn btn-primary" onclick="confirmAddAction()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>追加</button>
        </div>
      </div>
    </div>
  `;
}

async function confirmAddAction() {
  const title = document.getElementById('act-title').value.trim();
  if (!title) { alert('アクション内容を入力してください'); return; }
  const assigneeIds = [...document.querySelectorAll('input[name="act-assignee"]:checked')].map(el => el.value);
  if (assigneeIds.length === 0) { alert('担当者を1名以上選択してください'); return; }
  const deadline = document.getElementById('act-deadline').value;
  if (!deadline) { alert('期限を入力してください'); return; }

  const newAction = {
    id: 'act_' + Date.now(),
    title, assigneeIds, deadline, status: 'todo', carryoverCount: 0,
    source: addActionContext.type + ':' + addActionContext.id,
    sourceLabel: addActionContext.label,
    meetingId: state.currentMeetingId
  };
  state.actions.push(newAction);

  const m = getCurrentMeeting();
  if (addActionContext.type === 'signal') {
    if (!m.signalDiscussions[addActionContext.id]) m.signalDiscussions[addActionContext.id] = { transcript: '', conclusion: '', actions: [] };
    if (!m.signalDiscussions[addActionContext.id].actions) m.signalDiscussions[addActionContext.id].actions = [];
    m.signalDiscussions[addActionContext.id].actions.push(newAction.id);
  } else if (addActionContext.type === 'topic') {
    const t = m.topics.find(x => x.id === addActionContext.id);
    if (t) {
      t.actions = t.actions || [];
      t.actions.push(newAction.id);
    }
  }
  await saveState();
  closeModal();
  renderAll();
}

        </div>
      </div>
    </div>
  `;
}
async function confirmCompleteMeeting() {
  const m = getCurrentMeeting();
  m.status = 'completed';
  m.completedAt = new Date().toISOString();
  // 未完了アクションの持ち越し回数を+1
  state.actions.forEach(a => {
    if (a.meetingId === state.currentMeetingId && a.status !== 'done') {
      a.carryoverCount = (a.carryoverCount || 0) + 1;
    }
  });
  // currentMeetingId を null にして過去ログへ移動させる
  state.currentMeetingId = null;
  await saveState();
  closeModal();
  switchPage('log');
  renderAll();
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
  addActionContext = null;
}

// ============================================================
// アクション一覧
// ============================================================
function renderActions() {
  const statusFilters = [
    { id: 'all', label: 'すべて' },
    { id: 'todo', label: '未着手' },
    { id: 'in_progress', label: '進行中' },
    { id: 'overdue', label: '期限超過', danger: true },
    { id: 'done', label: '完了' }
  ];
  // 担当者フィルタ: 'all' or person id
  if (typeof actionAssigneeFilter === 'undefined') window.actionAssigneeFilter = 'all';
  let filtered = state.actions;
  if (actionFilter === 'overdue') filtered = state.actions.filter(a => isOverdue(a));
  else if (actionFilter !== 'all') filtered = state.actions.filter(a => a.status === actionFilter);
  if (actionAssigneeFilter !== 'all') filtered = filtered.filter(a => getAssigneeIds(a).includes(actionAssigneeFilter));
  filtered = [...filtered].sort((a, b) => {
    const aO = isOverdue(a) ? 0 : 1;
    const bO = isOverdue(b) ? 0 : 1;
    if (aO !== bO) return aO - bO;
    return new Date(a.deadline) - new Date(b.deadline);
  });

  return `
    <div class="page-intro">
      <div class="page-intro-eyebrow">ACTION ITEMS</div>
      <div class="page-intro-title">アクションアイテム一覧</div>
      <div class="page-intro-desc">
        定例で決まったアクションを一元管理。期限超過と持ち越し回数を可視化します。
      </div>
    </div>

    <div style="margin-bottom: 14px;">
      <button class="btn btn-primary btn-sm" onclick="openAddActionFromActionsPage()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        アクションを追加
      </button>
    </div>

    <div class="filter-pills" style="margin-bottom:6px;">
      ${statusFilters.map(f => {
        let count = state.actions.length;
        if (f.id === 'overdue') count = state.actions.filter(a => isOverdue(a)).length;
        else if (f.id !== 'all') count = state.actions.filter(a => a.status === f.id).length;
        const isActive = actionFilter === f.id;
        const dangerClass = f.danger && count > 0 ? 'danger has-count' : '';
        return `
          <button class="filter-pill ${dangerClass} ${isActive ? 'active' : ''}" onclick="setActionFilter('${f.id}')">
            ${f.label}<span class="count">${count}</span>
          </button>
        `;
      }).join('')}
    </div>
    <div class="filter-pills" style="margin-bottom:14px;">
      <button class="filter-pill ${actionAssigneeFilter === 'all' ? 'active' : ''}" onclick="setActionAssigneeFilter('all')">
        全員<span class="count">${state.actions.length}</span>
      </button>
      ${getEffectivePersons().filter(p => p.id !== 'other').map(p => {
        const cnt = state.actions.filter(a => getAssigneeIds(a).includes(p.id)).length;
        return `
          <button class="filter-pill ${actionAssigneeFilter === p.id ? 'active' : ''}" onclick="setActionAssigneeFilter('${p.id}')">
            <div class="avatar avatar-xs ${p.avatarClass}" style="width:14px;height:14px;font-size:8px;flex-shrink:0;">${p.initial}</div>
            ${escapeHtml(p.name)}<span class="count">${cnt}</span>
          </button>
        `;
      }).join('')}
    </div>

    <div id="bulk-action-bar" style="display:${selectedActions.size > 0 ? 'flex' : 'none'}; margin-bottom:12px; padding:10px 14px; background:var(--accent-fog-soft); border:1px solid var(--ink-200); border-radius:var(--radius); align-items:center; gap:10px; flex-wrap:wrap;">
      <span id="bulk-selected-count" style="font-size:13px; font-weight:600; color:var(--accent-fog);">0件選択中</span>
      <button class="btn btn-ghost btn-sm" onclick="selectAllActions()" style="font-size:12px;">すべて選択</button>
      <button class="btn btn-ghost btn-sm" onclick="clearActionSelection()" style="font-size:12px;">選択解除</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSelectedActions()" style="margin-left:auto; font-size:12px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        選択したアクションを削除
      </button>
    </div>

    ${filtered.length === 0 ? `
      <div class="card empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>
        該当するアクションがありません
      </div>
    ` : `
      <div class="action-list-card">
        ${filtered.map(a => renderActionRow(a)).join('')}
      </div>
    `}
  `;
}

function renderActionRow(a) {
  const overdue = isOverdue(a);
  const daysLeft = daysUntil(a.deadline);
  const nearDue = !overdue && a.status !== 'done' && daysLeft !== null && daysLeft >= 0 && daysLeft <= 3;
  let pill;
  if (overdue) pill = `<span class="pill pill-danger"><span class="pill-dot pill-dot-danger"></span>${a.carryoverCount}回持ち越し</span>`;
  else if (a.status === 'done') pill = '<span class="pill pill-success"><span class="pill-dot pill-dot-success"></span>完了</span>';
  else if (nearDue) pill = `<span class="pill pill-warn"><span class="pill-dot" style="background:var(--accent-gold);"></span>${daysLeft === 0 ? '今日期限' : daysLeft + '日後'}</span>`;
  else if (a.status === 'in_progress') pill = '<span class="pill pill-info">進行中</span>';
  else pill = '<span class="pill pill-todo"><span class="pill-dot pill-dot-todo"></span>未着手</span>';

  const isChecked = selectedActions.has(a.id);
  return `
    <div class="action-row ${nearDue ? 'near-due' : ''}" style="grid-template-columns: 20px auto 1fr auto auto auto;" id="action-row-${a.id}">
      <input type="checkbox" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent-ink);" ${isChecked ? 'checked' : ''} onchange="toggleActionSelect('${a.id}', this.checked)">
      ${pill}
      <div>
        <div class="action-title ${a.status === 'done' ? 'done' : ''}">${escapeHtml(a.title)}</div>
        <div class="action-meta">
          <span style="display:inline-flex;align-items:center;gap:3px;">${renderAssigneeAvatars(a)}<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px;margin-left:2px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${escapeHtml(getAssigneeNames(a))}</span>
          <span class="meta-sep">·</span>
          <span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${formatDateShort(a.deadline)}</span>
          <span class="meta-sep">·</span>
          <span style="color: var(--ink-400);">${escapeHtml(a.sourceLabel || '')}</span>
        </div>
      </div>
      <select class="status-select" onchange="updateActionStatus('${a.id}', this.value)">
        <option value="todo" ${a.status === 'todo' ? 'selected' : ''}>未着手</option>
        <option value="in_progress" ${a.status === 'in_progress' ? 'selected' : ''}>進行中</option>
        <option value="done" ${a.status === 'done' ? 'selected' : ''}>完了</option>
      </select>
      <button class="btn-icon-edit" onclick="openEditActionModal('${a.id}')" title="アクションを編集">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="btn-icon-delete" onclick="deleteAction('${a.id}')" title="アクションを削除">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  `;
}

function setActionFilter(f) {
  actionFilter = f;
  selectedActions.clear();
  renderPage();
}

function setActionAssigneeFilter(id) {
  window.actionAssigneeFilter = id;
  selectedActions.clear();
  renderPage();
}

function toggleActionSelect(actionId, checked) {
  if (checked) selectedActions.add(actionId);
  else selectedActions.delete(actionId);
  // バーの表示更新（再描画なしで軽量に）
  const bar = document.getElementById('bulk-action-bar');
  const countEl = document.getElementById('bulk-selected-count');
  if (bar) bar.style.display = selectedActions.size > 0 ? 'flex' : 'none';
  if (countEl) countEl.textContent = selectedActions.size + '件選択中';
}

function selectAllActions() {
  let filtered = state.actions;
  if (actionFilter === 'overdue') filtered = state.actions.filter(a => isOverdue(a));
  else if (actionFilter !== 'all') filtered = state.actions.filter(a => a.status === actionFilter);
  filtered.forEach(a => selectedActions.add(a.id));
  renderPage();
}

function clearActionSelection() {
  selectedActions.clear();
  renderPage();
}

async function deleteSelectedActions() {
  if (selectedActions.size === 0) return;
  if (!confirm(selectedActions.size + '件のアクションを削除しますか？')) return;
  state.actions = state.actions.filter(a => !selectedActions.has(a.id));
  selectedActions.clear();
  await saveState();
  renderAll();
}

async function updateActionStatus(actionId, newStatus) {
  const a = state.actions.find(x => x.id === actionId);
  if (a) {
    const wasOverdue = isOverdue(a);
    a.status = newStatus;
    // 完了に戻す場合は持ち越し回数をリセット
    if (newStatus === 'done') {
      a.carryoverCount = 0;
    }
    await saveState();
    renderAll();
  }
}

function openEditActionModal(actionId) {
  const a = state.actions.find(x => x.id === actionId);
  if (!a) return;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head">
          <div>
            <div class="modal-title">アクションを編集</div>

          </div>
          <button class="modal-close" onclick="closeModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>

            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
              ${getEffectivePersons().filter(p => p.id !== 'other').map(p => `
                <label style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--ink-200); border-radius: var(--radius); cursor: pointer; flex: 1; min-width: 120px;">
                  <input type="checkbox" name="edit-act-assignee" value="${p.id}" ${getAssigneeIds(a).includes(p.id) ? 'checked' : ''}>
                  <div class="avatar avatar-xs ${p.avatarClass}">${p.initial}</div>
                  <span style="font-size: 13px;">${escapeHtml(p.name)}</span>

              `).join('')}
            </div>
          </div>
          <div class="modal-field">
            <div class="field-label">期限</div>
            <input type="date" class="input" id="edit-act-deadline" value="${a.deadline}">
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
          <button class="btn btn-primary" onclick="confirmEditAction('${actionId}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>保存</button>
        </div>
      </div>
    </div>
  `;
}

async function confirmEditAction(actionId) {
  const a = state.actions.find(x => x.id === actionId);
  if (!a) return;
  const title = document.getElementById('edit-act-title').value.trim();
  if (!title) { alert('アクション内容を入力してください'); return; }
  const assigneeIds = [...document.querySelectorAll('input[name="edit-act-assignee"]:checked')].map(el => el.value);
  if (assigneeIds.length === 0) { alert('担当者を1名以上選択してください'); return; }
  const deadline = document.getElementById('edit-act-deadline').value;
  if (!deadline) { alert('期限を入力してください'); return; }
  a.title = title;
  a.assigneeIds = assigneeIds;
  delete a.assigneeId;
  a.deadline = deadline;
  await saveState();
  closeModal();
  renderAll();
}

async function deleteAction(actionId) {
  if (!confirm('このアクションを削除しますか？')) return;
  state.actions = state.actions.filter(x => x.id !== actionId);
  await saveState();
  renderAll();
}

}

function getEffectiveSignalThemes() {
  const custom = state.customSignals || {};
  return SIGNAL_THEMES.map(theme => {
    const themeCustom = custom[theme.id] || {};
    const deletedIds = new Set(themeCustom.deleted || []);
    const addedSignals = themeCustom.added || [];
    const textOverrides = themeCustom.textOverrides || {};

    // ベースシグナル（削除フラグ + テキスト上書き）
    const baseSignals = theme.signals.map(s => ({
      ...s,
      text: textOverrides[s.id] !== undefined ? textOverrides[s.id] : s.text,
      _deleted: deletedIds.has(s.id)
    }));
    // 追加シグナル
    const extraSignals = addedSignals.map(s => ({
      ...s,
      text: textOverrides[s.id] !== undefined ? textOverrides[s.id] : s.text,
    }));

    // 全シグナルをflat化（削除済み含む）
    const allSignals = [...baseSignals, ...extraSignals];

    // orderが保存されていれば並び替え（削除済みはそのまま末尾）
    const order = themeCustom.order || [];
    if (order.length > 0) {
      const ordered = [];
      // orderに従ってアクティブなものを並べる
      for (const sid of order) {
        const sig = allSignals.find(s => s.id === sid);
        if (sig) ordered.push(sig);
      }
      // orderに含まれていないものを末尾に追加
      for (const sig of allSignals) {
        if (!order.includes(sig.id)) ordered.push(sig);
      }
      return { ...theme, signals: ordered };
    }

    return { ...theme, signals: allSignals };
  });
}

async function deleteCustomSignal(themeId, signalId) {
  if (!confirm('このシグナルを削除しますか？現在の定例のシグナルデータには影響しません。')) return;
  if (!state.customSignals) state.customSignals = {};
  if (!state.customSignals[themeId]) state.customSignals[themeId] = { deleted: [], added: [] };
  // added の中にあれば除去、なければ deletedに追加
  const addedIdx = (state.customSignals[themeId].added || []).findIndex(s => s.id === signalId);
  if (addedIdx >= 0) {
    state.customSignals[themeId].added.splice(addedIdx, 1);
  } else {
    if (!state.customSignals[themeId].deleted) state.customSignals[themeId].deleted = [];
    if (!state.customSignals[themeId].deleted.includes(signalId)) {
      state.customSignals[themeId].deleted.push(signalId);
    }
  }
  await saveState();
  renderPage();
}

async function addCustomSignal(themeId) {
  const input = document.getElementById('new-sig-' + themeId);
  const text = input ? input.value.trim() : '';
  if (!text) return;
  if (!state.customSignals) state.customSignals = {};
  if (!state.customSignals[themeId]) state.customSignals[themeId] = { deleted: [], added: [] };
  if (!state.customSignals[themeId].added) state.customSignals[themeId].added = [];
  const newId = 'custom_' + themeId + '_' + Date.now();
  state.customSignals[themeId].added.push({ id: newId, text });
  await saveState();
  renderPage();
}

async function resetCustomSignals() {

// シグナルの上下移動
async function moveSignal(themeId, signalId, direction) {
  // 現在の実効順序を取得
  const themes = getEffectiveSignalThemes();
  const theme = themes.find(t => t.id === themeId);
  if (!theme) return;
  const activeSignals = theme.signals.filter(s => !s._deleted);
  const idx = activeSignals.findIndex(s => s.id === signalId);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= activeSignals.length) return;

  // 入れ替え
  const newOrder = activeSignals.map(s => s.id);
  [newOrder[idx], newOrder[newIdx]] = [newOrder[newIdx], newOrder[idx]];

  if (!state.customSignals) state.customSignals = {};
  if (!state.customSignals[themeId]) state.customSignals[themeId] = {};
  state.customSignals[themeId].order = newOrder;
  await saveState();
  renderPage();
}

// ============================================================
// 自動同期（2段階ポーリング）
// ping（タイムスタンプのみ）で変更を検知 → 変更時のみfullデータ取得
// ============================================================
const POLL_INTERVAL_MS = 10000; // 10秒ごとにping
let pollTimer = null;
let lastSyncedJson = null;
let lastKnownTimestamp = null; // GAS上の最終更新タイムスタンプ
let isSyncing = false;
let pendingRender = false;

function setSyncStatus(status, text) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot || !label) return;
  dot.className = 'sync-dot ' + (status || '');
  label.textContent = text;
}

function isUserTyping() {
  const el = document.activeElement;
  if (!el) return false;
  const tag = el.tagName.toLowerCase();
  return tag === 'textarea' || tag === 'input' || el.isContentEditable;
}

function formatSyncTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' +
         now.getMinutes().toString().padStart(2,'0') + ':' +
         now.getSeconds().toString().padStart(2,'0');
}

// ① 軽量ping: タイムスタンプだけ取得して変更を検知
async function pingSync() {
  if (isSyncing) return;
  try {
    const res = await fetch(GAS_URL + '?action=ping', { mode: 'cors' });
    const result = await res.json();
    if (!result.ok) return;
    const ts = result.timestamp;
    if (ts && ts !== lastKnownTimestamp) {
      // タイムスタンプが変わった → フルデータを取得
      lastKnownTimestamp = ts;
      await fetchFullData();
    } else {
      // 変化なし → 時刻表示だけ更新
      setSyncStatus('', '最終確認: ' + formatSyncTime());
    }
  } catch (e) {
    // pingエラーは静かに無視（ネットワーク切断など）
    setSyncStatus('error', '接続確認中...');
  }
}

// ② フルデータ取得（変更検知時のみ呼ばれる）
async function fetchFullData() {
  if (isSyncing) return;
  isSyncing = true;
  setSyncStatus('syncing', '更新を取得中...');
  try {
    const res = await fetch(GAS_URL + '?action=get', { mode: 'cors' });
    const result = await res.json();
    if (!result.ok || !result.value) { isSyncing = false; return; }
    const freshJson = result.value;
    if (freshJson === lastSyncedJson) {
      setSyncStatus('', '最終同期: ' + formatSyncTime());
      isSyncing = false;
      return;
    }
    lastSyncedJson = freshJson;
    state = JSON.parse(freshJson);
    if (isUserTyping()) {
      setSyncStatus('updated', '更新あり（入力完了後に反映）');
      pendingRender = true;
    } else {
      renderAll();
      setSyncStatus('updated', '最終同期: ' + formatSyncTime() + ' ✓ 更新あり');
      setTimeout(() => setSyncStatus('', '最終同期: ' + formatSyncTime()), 3000);
    }
  } catch (e) {
    setSyncStatus('error', '取得エラー');
  }
  isSyncing = false;
}

// 入力完了時に保留中のrenderを実行
document.addEventListener('focusout', () => {
  if (pendingRender && !isUserTyping()) {
    pendingRender = false;
    renderAll();
    setSyncStatus('', '最終同期: ' + formatSyncTime());
  }
});

// 手動更新ボタン
async function manualSync() {
  const btn = document.getElementById('sync-refresh-btn');
  if (btn) { btn.classList.add('spinning'); setTimeout(() => btn.classList.remove('spinning'), 600); }
  await fetchFullData();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pingSync, POLL_INTERVAL_MS);
  setSyncStatus('', '最終同期: ' + formatSyncTime());
  lastSyncedJson = JSON.stringify(state);
}

// saveState をラップ: 自分の保存はdiffから除外 + タイムスタンプを記録
const _origSaveState = saveState;
saveState = async function() {
  await _origSaveState();
  lastSyncedJson = JSON.stringify(state);
  // 保存後にpingしてタイムスタンプを同期
  try {
    const res = await fetch(GAS_URL + '?action=ping', { mode: 'cors' });
    const result = await res.json();
    if (result.ok && result.timestamp) lastKnownTimestamp = result.timestamp;
  } catch(e) {}
  setSyncStatus('', '最終同期: ' + formatSyncTime());
};

// ============================================================
// 初期化
// ============================================================
(async function init() {
  setSyncStatus('syncing', 'GASから読み込み中...');
  try {
    await loadState();
  } catch (e) {
    console.error('init error:', e);
    if (!state) state = INITIAL_DATA;
  }
  renderAll();
  startPolling();
})();
</script>
